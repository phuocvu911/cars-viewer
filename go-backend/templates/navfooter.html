{{ define "nav" }}
<nav id="main-nav" class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-logo"><span class="logo-icon">◈</span><span class="logo-text">Auto<span
                    class="logo-accent">Vault</span></span></a>
        <div class="nav-links">
            <a href="/" class="nav-link {{ if eq .Page `home` }}active{{ end }}">Home</a>
            <a href="/gallery" class="nav-link {{ if eq .Page `gallery` }}active{{ end }}">Gallery</a>
            <a href="/compare" class="nav-link {{ if eq .Page `compare` }}active{{ end }}">Compare</a>
            <a href="/stats" class="nav-link {{ if eq .Page `stats` }}active{{ end }}">Stats</a>
        </div>
    </div>
</nav>
{{ end }}

{{ define "footer" }}
<div id="cookie_div" style="display: none;">
    <p id="cookie_disclaimer">The cookies are used for creating personalised recommendations...</p>
    <button id="accept_cookies_button">Accept all cookies</button>
    <button id="decline_cookies_button">Decline cookies</button>
</div>

<footer class="footer">
    <div class="footer-content">
        <p class="footer-copyright">© 2026 AutoVault. Built with Go. Developed by Hoang & Markus.</p>
    </div>
</footer>
{{ end }}
