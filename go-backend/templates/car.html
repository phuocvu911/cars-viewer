{{ define "content" }}


<div id="car-div" class="main-content">

    <h2 id="content-header">{{.MakeModel}}  {{.Year}} </h2>

    <img src="{{.ImageSource}}"> 

    <ul id="specifications">

        <h2>Specifications</h2>
        <h3>Engine: {{.Engine}}</h3>
        <h3>Horsepower: {{.EngineHP}}</h3>
        <h3>Transmission: {{.Transmission}}</h3>
        <h3>Drivetrain: {{.Drivetrain}}</h3>
    </ul>

    <ul id="about-manufacturer">
        <h2>About {{.Make}}</h2>
        <h3>{{.Make}} was founded in {{.CountryOfOrigin}} in {{.FoundingYear}}</h3>
    </ul>
   
</div>


{{end}}
